{% extends "base.html" %}
{% block title %}UniGo — Dashboard{% endblock %}
{% block content %}
<h1 class="page-title">Dashboard</h1>
<p class="page-sub">Students, trust scores, ride groups, and audit trail</p>

<div class="stats" id="stats"><div class="spinner"></div></div>

<div class="sections">
    <div>
        <div class="card">
            <div class="card-head"><i data-lucide="trophy" style="width:14px;height:14px"></i> Trust Leaderboard</div>
            <div class="card-body"><div class="table-wrap" id="leaders"><div class="spinner"></div></div></div>
        </div>
        <div class="card">
            <div class="card-head"><i data-lucide="car" style="width:14px;height:14px"></i> Ride Groups <button class="btn btn-outline" onclick="loadGroups()" style="font-size:11px;padding:4px 10px"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i></button></div>
            <div class="card-body"><div class="table-wrap" id="groups"><div class="spinner"></div></div></div>
        </div>
    </div>
    <div>
        <div class="card">
            <div class="card-head"><i data-lucide="scroll-text" style="width:14px;height:14px"></i> Trust Audit Log <button class="btn btn-outline" onclick="loadAudit()" style="font-size:11px;padding:4px 10px"><i data-lucide="refresh-cw" style="width:12px;height:12px"></i></button></div>
            <div class="card-body"><div class="table-wrap" id="audit"><div class="spinner"></div></div></div>
        </div>
        <div class="card">
            <div class="card-head"><i data-lucide="shield-alert" style="width:14px;height:14px"></i> Travel Risk Calculator</div>
            <div class="card-body pad">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Destination</label><select class="form-select" id="rDest"></select></div>
                    <div class="form-group"><label class="form-label">Connection time (hrs)</label><input type="number" class="form-input" id="rTime" value="6" min="0" max="24" step="0.5"></div>
                    <div class="form-group"><label class="form-label">Buffer</label><input type="number" class="form-input" id="rBuf" value="1.3" min="1" max="3" step="0.1"></div>
                </div>
                <button class="btn btn-black" onclick="calcRisk()">Calculate Risk</button>
                <div class="risk-result" id="riskRes"><div class="risk-level" id="riskLvl"></div><div class="risk-detail" id="riskDet"></div></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let dests=[];

async function loadAll(){
    const [stu,leaders,groups,audit,ds] = await Promise.all([
        api('/api/students'),api('/api/leaderboard'),api('/api/ride-groups'),api('/api/trust-audit'),api('/api/destinations')
    ]);
    if(!stu)return;
    dests=ds||[];

    const avg=(stu.reduce((a,s)=>a+s.trust_score,0)/stu.length).toFixed(1);
    const rides=stu.reduce((a,s)=>a+s.total_rides,0);
    const pg=stu.filter(s=>s.trust_score>=90).length;
    document.getElementById('stats').innerHTML=
        '<div class="stat"><div class="stat-label">Students</div><div class="stat-val">'+stu.length+'</div></div>'+
        '<div class="stat"><div class="stat-label">Avg Trust</div><div class="stat-val green">'+avg+'</div></div>'+
        '<div class="stat"><div class="stat-label">Total Rides</div><div class="stat-val">'+rides+'</div></div>'+
        '<div class="stat"><div class="stat-label">PriorityGo Eligible</div><div class="stat-val green">'+pg+'</div></div>';

    let h='<table><thead><tr><th>Rank</th><th>Name</th><th>Trust</th><th>Rides</th></tr></thead><tbody>';
    leaders.forEach(r=>{
        const rc=r.trust_rank<=3?'rank-'+r.trust_rank:'rank-n';
        h+='<tr><td><span class="rank '+rc+'">'+r.trust_rank+'</span></td><td>'+r.name+(r.trust_score>=90?' <span class="badge badge-green">PriorityGo</span>':'')+'</td><td>'+trustBar(r.trust_score)+'</td><td>'+r.total_rides+'</td></tr>';
    });
    document.getElementById('leaders').innerHTML=h+'</tbody></table>';

    renderGroups(groups);
    renderAudit(audit);
    document.getElementById('rDest').innerHTML=dests.map(d=>'<option value="'+d.destination_id+'">'+d.city_name+' ('+d.avg_travel_hours+'h)</option>').join('');
}

function renderGroups(data){
    if(!data||!data.length){document.getElementById('groups').innerHTML='<div class="empty">No groups</div>';return;}
    let h='<table><thead><tr><th>ID</th><th>Dest</th><th>Seats</th><th>Status</th></tr></thead><tbody>';
    data.forEach(g=>{h+='<tr><td>'+g.group_id+'</td><td>'+g.city_name+'</td><td>'+g.seats_filled+'/'+g.seat_capacity+'</td><td>'+badge(g.status)+'</td></tr>';});
    document.getElementById('groups').innerHTML=h+'</tbody></table>';
}

function renderAudit(data){
    if(!data||!data.length){document.getElementById('audit').innerHTML='<div class="empty">No audit entries</div>';return;}
    let h='<table><thead><tr><th>Student</th><th>Change</th><th>Reason</th></tr></thead><tbody>';
    data.forEach(r=>{
        const d=r.new_score-r.old_score, cls=d>=0?'up':'down', arrow=d>=0?'+':'-';
        h+='<tr><td>'+r.name+'</td><td><span class="delta '+cls+'">'+r.old_score+' → '+r.new_score+' ('+arrow+Math.abs(d)+')</span></td><td style="color:var(--text-secondary)">'+r.reason+'</td></tr>';
    });
    document.getElementById('audit').innerHTML=h+'</tbody></table>';
}

async function loadGroups(){renderGroups(await api('/api/ride-groups'));}
async function loadAudit(){renderAudit(await api('/api/trust-audit'));}

async function calcRisk(){
    const d=await api('/api/travel-risk',{method:'POST',body:{destination_id:document.getElementById('rDest').value,connection_time:document.getElementById('rTime').value,buffer_factor:document.getElementById('rBuf').value}});
    if(!d)return;
    const l=d.risk_level,c=l==='SAFE'?'safe':l==='RISKY'?'risky':'critical';
    const el=document.getElementById('riskRes');
    el.className='risk-result show '+c;
    document.getElementById('riskLvl').className='risk-level '+c;
    document.getElementById('riskLvl').textContent=l;
    const dest=dests.find(x=>x.destination_id==document.getElementById('rDest').value);
    const req=(dest.avg_travel_hours*parseFloat(document.getElementById('rBuf').value)).toFixed(1);
    document.getElementById('riskDet').textContent=dest.avg_travel_hours+'h x '+document.getElementById('rBuf').value+' = '+req+'h required | You have '+document.getElementById('rTime').value+'h';
}

loadAll();
</script>
{% endblock %}
