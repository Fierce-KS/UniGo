<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniGo{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="side-brand">U</div>
        <nav class="side-nav">
            <a href="/" class="side-link {{ 'active' if active == 'dashboard' }}" title="Dashboard">
                <i data-lucide="layout-dashboard" style="width:16px;height:16px"></i>
            </a>
            <a href="/find" class="side-link {{ 'active' if active == 'find' }}" title="Find Rides">
                <i data-lucide="search" style="width:16px;height:16px"></i>
            </a>
        </nav>
        <div class="side-footer">
            <div class="side-dot"></div>
        </div>
    </aside>
    <div class="app-main">
        <header class="topbar">
            <div class="topbar-left">
                <div class="topbar-title">UniGo</div>
                <div class="topbar-sub">
                    {{ 'Dashboard' if active == 'dashboard' else 'Find Rides' }}
                </div>
            </div>
            <div class="topbar-right">
                <div class="nav-student">
                    <label for="navStudent">Student</label>
                    <select id="navStudent" class="nav-select"></select>
                </div>
                <div class="pill">Oracle 21c XE</div>
            </div>
        </header>
        <div class="page">{% block content %}{% endblock %}</div>
    </div>
</div>
<div class="toast-box" id="toasts" role="status" aria-live="polite" aria-atomic="true"></div>
<script>
lucide.createIcons();
function toast(msg,type){
    const el=document.createElement('div');
    el.className='toast '+(type||'info');
    el.textContent=msg;
    el.setAttribute('role','status');
    el.setAttribute('aria-live','polite');
    document.getElementById('toasts').appendChild(el);
    setTimeout(()=>el.remove(),4000);
}
async function api(url,opts){
    try{
        const r=await fetch(url,{headers:{'Content-Type':'application/json'},...(opts||{}),body:opts&&opts.body?JSON.stringify(opts.body):undefined});
        return await r.json();
    }catch(e){toast('Connection error','error');return null;}
}
function trustBar(s){
    const p=Math.min(s/200*100,100),c=s>=120?'high':s>=70?'mid':'low';
    return '<div class="trust-wrap"><span>'+s+'</span><div class="trust-bar"><div class="trust-fill '+c+'" style="width:'+p+'%"></div></div></div>';
}
function badge(s){
    const m={FORMING:'blue',COMPLETED:'green',PENDING:'yellow',ACTIVE:'blue',PAID:'green'};
    return '<span class="badge badge-'+(m[s]||'gray')+'">'+s+'</span>';
}

let studentsCache = [];

function getCurrentStudentId(){
    return localStorage.getItem('unigo_student_id');
}

function getCurrentStudent(){
    const id = getCurrentStudentId();
    return studentsCache.find(s => String(s.student_id) === String(id));
}

function setCurrentStudentId(id){
    localStorage.setItem('unigo_student_id', String(id));
    document.dispatchEvent(new CustomEvent('student:change', {detail: {studentId: String(id)}}));
}

function renderStudentOptions(list){
    const sel = document.getElementById('navStudent');
    if(!sel || !list || !list.length) return;
    sel.innerHTML = list.map(s => '<option value="'+s.student_id+'">'+s.name+' (Trust '+s.trust_score+')</option>').join('');

    let saved = getCurrentStudentId();
    if(!saved || !list.find(s => String(s.student_id) === String(saved))){
        saved = String(list[0].student_id);
    }

    sel.value = saved;
    localStorage.setItem('unigo_student_id', String(saved));
}

async function refreshStudents(){
    const list = await api('/api/students');
    if(!list || !list.length) return;
    studentsCache = list;
    renderStudentOptions(list);
}

async function initStudentSelector(){
    const sel = document.getElementById('navStudent');
    if(!sel) return;

    const list = await api('/api/students');
    if(!list || !list.length) return;
    studentsCache = list;
    renderStudentOptions(list);
    const saved = getCurrentStudentId();
    document.dispatchEvent(new CustomEvent('student:ready', {detail: {studentId: String(saved), students: list}}));

    sel.addEventListener('change', (e) => setCurrentStudentId(e.target.value));
}

document.addEventListener('DOMContentLoaded', initStudentSelector);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
